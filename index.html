<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FitQuest</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="game-container">
  <div id="field-decorations"></div>
  <div id="obstacles-layer"></div>

  <div id="overlay">
    <div class="menu-card">
      <h1 id="menu-title">✨ FITQUEST ✨</h1>
      <p class="menu-subtitle">Step Up, Burn Calories, Defeat Diabetes!</p>
      
      <div class="setup-box interactive-panel" id="menu-setup-level">
        <h3>🌱 Select Stage Level</h3>
        <div class="level-arrow-container">
          <button class="arrow-btn" id="prev-lvl-btn" onclick="changeMenuLevel(-1)">⬅️</button>
          <span id="menu-level-display">LEVEL 1</span>
          <button class="arrow-btn" id="next-lvl-btn" onclick="changeMenuLevel(1)">➡️</button>
        </div>
        
        <div class="score-row-wrapper">
          <div id="high-score-display">🥇 Best Time: --:--.--</div>
          <button class="reset-score-btn" title="Reset level score" onclick="wipeCurrentLevelScore()">🗑️</button>
        </div>
      </div>

      <div class="setup-box interactive-panel" id="menu-setup-char">
        <h3>🎭 Select Character</h3>
        <div class="char-toggle-container">
          <button class="char-btn active-pink" id="btn-female" onclick="selectGender('female')">Female Hero</button>
          <button class="char-btn" id="btn-male" onclick="selectGender('male')">Male Hero</button>
        </div>
      </div>
      
      <div class="how-to-play-box interactive-panel" id="menu-instructions">
        <h3>🏃‍♂️ HOW TO PLAY & MOVE</h3>
        <ol>
          <li><span class="step-highlight">AIM:</span> Drag the virtual joystick to aim.</li>
          <li><span class="MOVE:</span> Walk/Jog in place to move your hero.</li>
        </ol>
      </div>

      <div id="menu-actions-container">
        <button class="cta-btn pulse-button" id="action-btn" onclick="igniteEngine()">START QUEST 🎮</button>
      </div>
    </div>
  </div>

  <div id="player"><div id="nav-arrow"><div class="arrow-stem"></div><div class="arrow-head"></div></div></div>
  <div id="enemy"></div>
  <div id="powerup-item" class="float-item"></div>
  <div id="joy-boundary"><div id="joy-stick"></div></div>

  <div id="ui-layer">
    <div class="top-bar">
      <div class="hp-housing"><div class="hp-label">💚 Hero</div><div class="hp-track"><div id="p-fill" class="hp-fill"></div></div></div>
      <div class="center-ui-badges"><div id="timer-badge">⏱️ 00:00.00</div></div>
      <div class="hp-housing" style="text-align: right;"><div class="hp-label">😈 Sugar</div><div class="hp-track"><div id="e-fill" class="hp-fill"></div></div></div>
    </div>
    <div class="control-deck">
      <div id="motion-display">Step Rate: 0.00</div>
    </div>
  </div>
</div>

<script src="game.js" defer></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.error('SW Failed:', err));
    });
  }
</script>

</body>
</html>
