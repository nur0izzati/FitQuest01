<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>FitQuest RPG</title>

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0,
          maximum-scale=1.0,
          user-scalable=no">

    <meta name="theme-color" content="#00ff66">

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            color: white;
            z-index: 999;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            padding: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: #00ff66;
            color: black;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div id="start-overlay">
    <h1>FITQUEST RPG</h1>

    <p>
        Walk/jog in place to move.<br><br>
        Shake hard to attack.
    </p>

    <button onclick="startMotion()">
        START
    </button>
</div>

<script src="game.js"></script>

<script>
    // Register Service Worker
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js")
            .then(() => console.log("Service Worker Registered"));
    }
</script>

</body>
</html>
