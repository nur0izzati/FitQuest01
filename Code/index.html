<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

<script>
  // Your real web app's Firebase configuration from console
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "fitquest-xxxxx.firebaseapp.com",
    projectId: "fitquest-xxxxx",
    storageBucket: "fitquest-xxxxx.appspot.com",
    messagingSenderId: "xxxxxxxxxxxx",
    appId: "xxxxxxxxxxxx"
  };

  // Initialize Firebase Cloud Connection
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Function called to back up player metrics to the server
  function savePlayerData(steps, lvl, xp) {
      db.collection("users").doc("test_player").set({
          totalSteps: steps,
          level: lvl,
          currentXP: xp,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true })
      .then(() => console.log("Cloud backup completed successfully!"))
      .catch((error) => console.error("Cloud synchronization error: ", error));
  }
</script>
